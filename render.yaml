services:
  - type: web
    name: phuket-dashboard
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm start -- --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /api/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FIRMS_KEY
        sync: false
      - key: ACLED_KEY
        sync: false
      - key: ACLED_EMAIL
        sync: false
